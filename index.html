<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Brickell Run Club</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #080808;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 28px;
    }

    body::before {
      content: '';
      position: fixed;
      top: -140px;
      left: 50%;
      transform: translateX(-50%);
      width: 520px;
      height: 520px;
      background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 30px;
      border: 1px solid #222;
      padding: 6px 14px;
      border-radius: 100px;
    }

    .icon { font-size: 60px; margin-bottom: 22px; display: block; }

    h1 {
      font-size: 38px;
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .sub {
      font-size: 15px;
      color: #666;
      margin-bottom: 44px;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 320px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 18px 24px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      background: #fff;
      color: #080808;
      transition: transform 0.15s, opacity 0.15s;
    }
    .btn:active { transform: scale(0.97); opacity: 0.9; }

    .footer {
      position: fixed;
      bottom: 26px;
      font-size: 12px;
      color: #333;
    }
  </style>
</head>
<body>

  <span class="badge">Powered by Nike · Baptist Health</span>
  <span class="icon">🏃</span>
  <h1>Brickell Run Club</h1>
  <p class="sub">Every Tuesday · 7 PM · Brickell<br>3.5 miles · All paces · Always free</p>

  <div class="actions">
    <a class="btn" id="storeLink" href="https://apps.apple.com/us/app/heylo-build-community-groups/id1445966180" target="_blank" rel="noopener">
      1. Download Heylo
    </a>
    <a class="btn" href="https://www.heylo.com/g/17efe88e-c443-4a13-a381-bdd4a5285317" target="_blank" rel="noopener">
      2. Join Brickell Run Club
    </a>
  </div>

  <p class="footer">#WeRunMiami</p>

  <script>
    // No redirects, no timers — only swaps the download link for Android.
    if (/Android/i.test(navigator.userAgent)) {
      document.getElementById('storeLink').href =
        'https://play.google.com/store/apps/details?id=com.piccup';
    }
  <\/script>
</body>
</html>
