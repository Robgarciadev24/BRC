<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Brickell Run Club</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #080808;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 28px;
    }

    body::before {
      content: '';
      position: fixed;
      top: -140px;
      left: 50%;
      transform: translateX(-50%);
      width: 520px;
      height: 520px;
      background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 30px;
      border: 1px solid #222;
      padding: 6px 14px;
      border-radius: 100px;
    }

    .icon { font-size: 60px; margin-bottom: 22px; display: block; }

    h1 {
      font-size: 38px;
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .sub {
      font-size: 15px;
      color: #666;
      margin-bottom: 40px;
      line-height: 1.5;
    }

    /* Spinner shown on load while we try to open the app */
    .spinner-wrap { margin-bottom: 40px; }
    .spinner {
      width: 36px;
      height: 36px;
      border: 2.5px solid #222;
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-label { font-size: 13px; color: #555; }

    /* Button revealed after the load attempt */
    .actions { display: none; }
    .actions.visible { display: block; }

    .btn {
      display: block;
      width: 100%;
      max-width: 320px;
      padding: 18px 24px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      background: #fff;
      color: #080808;
      transition: transform 0.15s, opacity 0.15s;
    }
    .btn:active { transform: scale(0.97); opacity: 0.9; }

    .footer {
      position: fixed;
      bottom: 26px;
      font-size: 12px;
      color: #333;
    }
  </style>
</head>
<body>

  <span class="badge">Powered by Nike · Baptist Health</span>
  <span class="icon">🏃</span>
  <h1>Brickell Run Club</h1>
  <p class="sub">Every Tuesday · 7 PM · Brickell<br>3.5 miles · All paces · Always free</p>

  <div class="spinner-wrap" id="spinnerWrap">
    <div class="spinner"></div>
    <p class="spinner-label">Opening Heylo…</p>
  </div>

  <div class="actions" id="actions">
    <a class="btn" href="https://heylo.group/brickell-run-club" target="_blank" rel="noopener">
      Join Brickell Run Club →
    </a>
  </div>

  <p class="footer">#WeRunMiami</p>

  <script>
    const IOS_APP_STORE  = 'https://apps.apple.com/us/app/heylo-build-community-groups/id1445966180';
    const ANDROID_STORE  = 'https://play.google.com/store/apps/details?id=com.piccup';
    const DEEP_LINK_IOS  = 'heylo://group/brickell-run-club';
    const INTENT_ANDROID = 'intent://group/brickell-run-club#Intent;scheme=heylo;package=com.piccup;S.browser_fallback_url=' + encodeURIComponent(ANDROID_STORE) + ';end';

    const ua        = navigator.userAgent;
    const isIOS     = /iPhone|iPad|iPod/i.test(ua);
    const isAndroid = /Android/i.test(ua);

    const spinnerWrap = document.getElementById('spinnerWrap');
    const actions     = document.getElementById('actions');

    function showButton() {
      spinnerWrap.style.display = 'none';
      actions.classList.add('visible');
    }

    function run() {
      if (isIOS) {
        // Try to open the app. If it's not installed, the scheme fails and we
        // send them to the App Store. If it IS installed, the app opens and
        // this page goes to the background (so the store redirect is cancelled).
        window.location.href = DEEP_LINK_IOS;
        setTimeout(() => { if (!document.hidden) window.location.href = IOS_APP_STORE; }, 800);
        setTimeout(showButton, 2200);
      } else if (isAndroid) {
        // Android intent opens the app if installed, else the Play Store.
        window.location.href = INTENT_ANDROID;
        setTimeout(showButton, 2200);
      } else {
        // Desktop — just show the button.
        showButton();
      }
    }

    setTimeout(run, 500);
  <\/script>
</body>
</html>
