<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Brickell Run Club</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #080808;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 28px;
    }

    body::before {
      content: '';
      position: fixed;
      top: -140px;
      left: 50%;
      transform: translateX(-50%);
      width: 520px;
      height: 520px;
      background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 30px;
      border: 1px solid #222;
      padding: 6px 14px;
      border-radius: 100px;
    }

    .icon {
      font-size: 60px;
      margin-bottom: 22px;
      display: block;
    }

    h1 {
      font-size: 38px;
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .sub {
      font-size: 15px;
      color: #666;
      margin-bottom: 44px;
      line-height: 1.5;
    }

    .btn {
      display: block;
      width: 100%;
      max-width: 320px;
      padding: 18px 24px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      background: #fff;
      color: #080808;
      transition: transform 0.15s, opacity 0.15s;
    }
    .btn:active { transform: scale(0.97); opacity: 0.9; }

    .footer {
      position: fixed;
      bottom: 26px;
      font-size: 12px;
      color: #333;
    }
  </style>
</head>
<body>

  <span class="badge">Powered by Nike · Baptist Health</span>
  <span class="icon">🏃</span>
  <h1>Brickell Run Club</h1>
  <p class="sub">Every Tuesday · 7 PM · Brickell<br>3.5 miles · All paces · Always free</p>

  <a class="btn" href="https://heylo.group/brickell-run-club" target="_blank" rel="noopener">
    Join the Heylo Group →
  </a>

  <p class="footer">#WeRunMiami</p>

</body>
</html>
